<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - I&I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>

<form id="loginForm">

  <input
    type="text"
    id="username"
    placeholder="Username"
    required
  >

  <br><br>

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <br><br>

  <button type="submit">Login</button>

</form>

<p id="message"></p>

<script src="app.js"></script>

</body>
</html>
