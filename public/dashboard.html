<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I&I Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌍 I&I Dashboard</h1>
<img
  id="profileImage"
  src="/uploads/default.png"
  width="120"
  height="120"
  style="border-radius:50%;object-fit:cover;border:3px solid #0d6efd;"
>
<h2 id="welcome">Loading...</h2>

<p id="subscription"></p>

<a href="upload.html">
<button>📷 Upload Photo</button>
</a>

<br><br>

<a href="edit-profile.html">
<button>👤 Edit Profile</button>
</a>
<br><br>

<a href="profile-photo.html">
  <button>🖼 Profile Picture</button>
</a>
<br><br>

<button onclick="logout()">🚪 Logout</button>

<br><br>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
<a href="search.html">
  <button>🔍 Search Users</button>
</a>
<a href="topic.html">
<button>
💡 Suggest Topic
</button>
</a>

<hr>

<h2>Latest Posts</h2>

<div id="posts"></div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "/login.html";
}

document.getElementById("welcome").innerText =
  "Welcome, " + user.username;

document.getElementById("subscription").innerText =
  "Subscription: " + user.subscription;
if (user.profilePhoto) {
  document.getElementById("profileImage").src =
    "/uploads/" + user.profilePhoto;
}
function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login.html";
}

function toggleDarkMode(){

  document.body.classList.toggle("dark-mode");

  const enabled =
    document.body.classList.contains("dark-mode");

  localStorage.setItem("darkMode", enabled);

}


if(localStorage.getItem("darkMode") === "true"){
  document.body.classList.add("dark-mode");
}
</script>

<script src="app.js"></script>

</body>
</html>
