<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile - I&I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Edit Profile</h1>

<form id="editProfileForm">

  <input
    type="text"
    id="username"
    placeholder="New Username"
    required
  >

  <br><br>

  <input
    type="password"
    id="password"
    placeholder="New Password"
    required
  >

  <br><br>

  <button type="submit">
    Save Changes
  </button>

</form>

<p id="message"></p>

<script src="edit-profile.js"></script>

</body>
</html>
