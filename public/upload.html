<!DOCTYPE html>
<html>
<head>
  <title>Upload Photo - I&I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Upload Photo</h1>

<form id="uploadForm" enctype="multipart/form-data">

  <input
    type="file"
    id="photo"
    accept="image/*"
    required
  >

  <br><br>

  <button type="submit">
    Upload Photo
  </button>

</form>

<p id="message"></p>

<script src="upload.js"></script>

</body>
</html>
