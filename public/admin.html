<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - I&I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>I&I Admin Panel</h1>

<form id="postForm">

  <input
    type="text"
    id="username"
    placeholder="Admin Username"
    required
  >

  <br><br>

  <input
    type="password"
    id="password"
    placeholder="Admin Password"
    required
  >

  <br><br>

  <input
    type="text"
    id="type"
    placeholder="Post Type"
    required
  >

  <br><br>

  <input
    type="text"
    id="title"
    placeholder="Post Title"
    required
  >

  <br><br>

  <textarea
    id="content"
    placeholder="Write your post..."
    rows="6"
    cols="35"
    required
  ></textarea>

  <br><br>

  <button type="submit">
    Publish
  </button>

</form>

<p id="message"></p>

<script src="admin.js"></script>

</body>
</html>
